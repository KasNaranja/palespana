name: keep-alive

# Mantiene despierto el servicio free de Render (se duerme tras ~15 min sin
# tráfico). GitHub Actions hace un ping cada ~10 min. Gratis en repo público.
# Nota: el cron de GitHub puede retrasarse algunos minutos; si aún así notas
# arranques fríos, se puede bajar a */5 o usar un pinger externo (UptimeRobot).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Si se solapan dos runs, cancela el viejo (no hace falta acumular pings).
concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app (despierta si estaba dormida)
        run: |
          URL="https://cazapal.onrender.com/"
          for i in 1 2 3 4; do
            code=$(curl -s -m 60 -o /dev/null -w '%{http_code}' "$URL" || echo 000)
            echo "ping $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 20
          done
          echo "Aviso: sin 200 tras varios intentos (posible arranque frío en curso)."
